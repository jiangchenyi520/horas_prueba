<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Horas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    padding:25px;
    color:white;
}

.container{
    max-width:700px;
    margin:auto;
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:34px;
    font-weight:600;
    color:#ffffff;
}

.seccion{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    transition:0.3s;
}

.seccion:hover{
    transform:translateY(-3px);
}

h3{
    margin-bottom:15px;
    color:#38bdf8;
    font-size:22px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    font-size:14px;
    color:#cbd5e1;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border:2px solid #38bdf8;
    background:#0f172a;
}

.resultado{
    background:#0f172a;
    padding:15px;
    border-radius:14px;
    margin-top:12px;
    font-size:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.resultado span{
    color:#38bdf8;
    font-weight:600;
    font-size:20px;
}

.total{
    background:linear-gradient(135deg,#0284c7,#38bdf8);
    color:white;
}

.total span{
    color:white;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h2>Calculadora de Horas</h2>

<!-- FECHA -->
<div class="seccion">

    <h3>📅 Día</h3>

    <label>Selecciona el día</label>

    <input type="date" id="fecha">

    <div class="resultado">
        <div>Día seleccionado</div>
        <span id="diaTexto">-</span>
    </div>

</div>

<!-- MAÑANA -->
<div class="seccion">

    <h3>Mañana</h3>

    <label>Entrada</label>
    <input type="time" id="mananaInicio">

    <label>Salida</label>
    <input type="time" id="mananaFin">

</div>

<!-- TARDE -->
<div class="seccion">

    <h3>Tarde</h3>

    <label>Entrada</label>
    <input type="time" id="tardeInicio">

    <label>Salida</label>
    <input type="time" id="tardeFin">

</div>

<!-- NOCHE -->
<div class="seccion">

    <h3>Noche</h3>

    <label>Entrada</label>
    <input type="time" id="nocheInicio">

    <label>Salida</label>
    <input type="time" id="nocheFin">

</div>

<!-- RESULTADOS -->
<div class="seccion">

    <h3>📊 Resultados</h3>

    <div class="resultado">
        <div>Horas mañana</div>
        <span id="horasManana">0.00</span>
    </div>

    <div class="resultado">
        <div>Horas tarde</div>
        <span id="horasTarde">0.00</span>
    </div>

    <div class="resultado">
        <div>Horas noche</div>
        <span id="horasNoche">0.00</span>
    </div>

    <div class="resultado total">
        <div>Horas totales</div>
        <span id="horasTotal">0.00</span>
    </div>

</div>

</div>

<script>

// CONVERTIR HORA A MINUTOS
function convertirMinutos(hora){

    if(!hora) return 0;

    let partes = hora.split(":");

    let horas = parseInt(partes[0]);

    let minutos = parseInt(partes[1]);

    return (horas * 60) + minutos;
}


// CALCULAR HORAS
function calcularHoras(inicio, fin){

    if(!inicio || !fin) return 0;

    let inicioMin = convertirMinutos(inicio);

    let finMin = convertirMinutos(fin);

    // PASA DE MEDIANOCHE
    if(finMin < inicioMin){

        finMin += 1440;

    }

    return (finMin - inicioMin) / 60;
}


// CALCULAR TODO
function calcular(){

    // MAÑANA
    let mInicio =
        document.getElementById("mananaInicio").value;

    let mFin =
        document.getElementById("mananaFin").value;

    // TARDE
    let tInicio =
        document.getElementById("tardeInicio").value;

    let tFin =
        document.getElementById("tardeFin").value;

    // NOCHE
    let nInicio =
        document.getElementById("nocheInicio").value;

    let nFin =
        document.getElementById("nocheFin").value;


    // HORAS
    let horasM =
        calcularHoras(mInicio, mFin);

    let horasT =
        calcularHoras(tInicio, tFin);

    let horasN =
        calcularHoras(nInicio, nFin);


    // TOTAL
    let total =
        horasM + horasT + horasN;


    // MOSTRAR RESULTADOS
    document.getElementById("horasManana").innerText =
        horasM.toFixed(2);

    document.getElementById("horasTarde").innerText =
        horasT.toFixed(2);

    document.getElementById("horasNoche").innerText =
        horasN.toFixed(2);

    document.getElementById("horasTotal").innerText =
        total.toFixed(2);

}


// EVENTOS
document.querySelectorAll("input").forEach(input=>{

    input.addEventListener("input", calcular);

});


// MOSTRAR DÍA
function mostrarDia(){

    let fecha =
        document.getElementById("fecha").value;

    if(!fecha) return;

    let dias = [

        "Domingo",
        "Lunes",
        "Martes",
        "Miércoles",
        "Jueves",
        "Viernes",
        "Sábado"

    ];

    let f = new Date(fecha);

    let nombreDia =
        dias[f.getDay()];

    document.getElementById("diaTexto").innerText =
        nombreDia + " " + f.getDate();

}


// EVENTO FECHA
document
.getElementById("fecha")
.addEventListener("input", mostrarDia);

</script>

</body>
</html>
